version: '3.8'

services:
  jira-ai-issue-solver:
    build:
      context: .
      dockerfile: Dockerfile
    image: jira-ai-issue-solver:latest
    container_name: jira-ai-issue-solver
    ports:
      - "8080:8080"
    volumes:
      # Mount configuration file (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Mount GitHub App private key (read-only)
      # The path inside the container must match github.private_key_path in config.yaml
      - ./keys/github-app.private-key.pem:/etc/bot/key.pem:ro
      # Workspace directory (read-write — the bot clones repos here)
      - ai_bot_workspaces:/var/lib/ai-bot/workspaces
    environment:
      # These can be overridden by creating a .env file
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security: run as non-root user (matches Dockerfile)
    user: "1001:0"
    # Resource limits (for the bot itself, not AI containers)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

volumes:
  ai_bot_workspaces:
    driver: local
